version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: talos-ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: talosledger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - talos-ledger-postgres:/var/lib/postgresql/data

volumes:
  talos-ledger-postgres:
